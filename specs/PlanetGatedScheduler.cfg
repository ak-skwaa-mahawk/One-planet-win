SPECIFICATION
    Spec

INVARIANTS
    Safety
    Inv_IndividualValidity
    Inv_TribeQuota
    Inv_EmergencyFilter
    Inv_PlanetTube

CONSTANTS
    \* Planet gate gain
    K = 1.0

    \* Planet limits
    EMax = 10.0
    CMax = 10.0
    GMax = 10.0

    \* Planet OK tolerance
    EpsP = 0.1

    \* Planetary tube radius
    DeltaP = 20.0

    \* Tribes
    KSet = { "alpha", "beta" }

    \* Quotas
    Q = [ "alpha" |-> 5.0,
          "beta"  |-> 5.0 ]

    \* Emergency threshold
    WBar = 0.7

CONSTRAINT
    \* Bound the state space for TLC exploration
    E >= 0 /\ E <= 20 /\
    C >= 0 /\ C <= 20 /\
    G >= 0 /\ G <= 20 /\
    \A k \in KSet: U[k] >= 0 /\ U[k] <= 10

CHECK_DEADLOCK
    TRUE